<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sauce-Watch TV</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #000000;
      color: #ffffff;
      font-family: sans-serif;
      overflow-x: hidden;
    }
    
    .container {
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    /* Search */
    .search-box {
      width: 90%;
      margin: 0 auto 40px auto;
    }
    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      font-size: 28px;
      border: 4px solid #444;
      border-radius: 8px;
      background-color: #222;
      color: #fff;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #FFFF00;
      background-color: #333;
    }

    /* Results */
    .results {
      text-align: left;
      padding-left: 5%;
      padding-right: 5%;
    }
    .card {
      display: inline-block;
      width: 220px;
      margin: 15px;
      border: 5px solid transparent;
      border-radius: 6px;
      background-color: #111;
      cursor: pointer;
      text-decoration: none;
      color: white;
      vertical-align: top;
      outline: none;
      text-align: center;
      transition: transform 0.2s;
    }
    .card:focus, .card:hover {
      border-color: #FFFF00;
      transform: scale(1.05);
      background-color: #333;
    }
    .card img {
      width: 100%;
      height: 330px;
      object-fit: cover;
      display: block;
    }
    .card .title {
      padding: 12px;
      font-size: 20px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message {
      font-size: 24px;
      color: #aaa;
      margin-top: 50px;
    }

    /* Player */
    #player-view {
      display: none;
      width: 100%;
      height: 100%;
      text-align: left;
    }
    .back-btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 24px;
      background-color: #333;
      color: #fff;
      text-decoration: none;
      border: 4px solid transparent;
      border-radius: 8px;
      margin: 20px;
      outline: none;
    }
    .back-btn:focus, .back-btn:hover {
      border-color: #FFFF00;
      background-color: #555;
    }
    iframe {
      width: 100%;
      height: 85vh;
      border: none;
      background-color: #000;
    }
    
    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="search-view" class="container">
    <h1>Sauce-Watch TV</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movies or TV shows..." tabindex="1">
    </div>
    <div id="message" class="message">Type a movie or show to search...</div>
    <div id="results" class="results"></div>
  </div>

  <div id="player-view">
    <a href="tv.html" class="back-btn" tabindex="1">Go Back to Search</a>
    <iframe id="videoPlayer" src="" allowfullscreen></iframe>
  </div>

  <script>
    var API_KEY = "607bf14c16a8ab16f9ed61e6ba5920a7";
    var BASE_URL = "https://api.themoviedb.org/3";
    var IMG_BASE = "https://image.tmdb.org/t/p/w500";
    
    function getQueryParam(name) {
      var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
      return match && decodeURIComponent(match[1].replace(/\+/g, ' '));
    }

    var idParam = getQueryParam('id');
    var typeParam = getQueryParam('type') || 'movie';

    if (idParam) {
      // Show Player
      document.getElementById('search-view').className += ' hidden';
      document.getElementById('player-view').style.display = 'block';
      
      // We start with episode 1 for TV shows on the basic tv.html route
      var src = typeParam === 'tv' 
        ? 'https://player.videasy.net/tv/' + idParam + '/1/1'
        : 'https://player.videasy.net/movie/' + idParam;
        
      document.getElementById('videoPlayer').src = src;
      document.querySelector('.back-btn').focus();
    } else {
      // Show Search
      var searchInput = document.getElementById('searchInput');
      var resultsContainer = document.getElementById('results');
      var messageContainer = document.getElementById('message');
      var timeoutId = null;

      function ajaxGet(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                callback(null, data);
              } catch (e) {
                callback(e, null);
              }
            } else {
              callback(new Error("Request failed with status " + xhr.status), null);
            }
          }
        };
        xhr.open("GET", url, true);
        xhr.send();
      }

      function renderResults(results) {
        resultsContainer.innerHTML = '';
        if (!results || results.length === 0) {
          messageContainer.innerHTML = 'No results found.';
          messageContainer.style.display = 'block';
          return;
        }
        
        messageContainer.style.display = 'none';

        var tabIndex = 2;
        for (var i = 0; i < results.length; i++) {
          var item = results[i];
          if (item.media_type === 'person') continue;
          
          var title = item.title || item.name || "Unknown";
          var imageUrl = item.poster_path ? (IMG_BASE + item.poster_path) : 'logo.jpg';
          var type = item.media_type || (item.title ? 'movie' : 'tv');
          
          var link = document.createElement('a');
          link.className = 'card';
          link.href = 'tv.html?id=' + item.id + '&type=' + type;
          link.tabIndex = tabIndex++;

          var img = document.createElement('img');
          img.src = imageUrl;
          img.alt = title;

          var titleDiv = document.createElement('div');
          titleDiv.className = 'title';
          titleDiv.innerHTML = title;

          link.appendChild(img);
          link.appendChild(titleDiv);
          resultsContainer.appendChild(link);
        }
      }

      function performSearch(query) {
        if (!query || query.replace(/^\s+|\s+$/g, '') === '') {
          resultsContainer.innerHTML = '';
          messageContainer.innerHTML = 'Type a movie or show to search...';
          messageContainer.style.display = 'block';
          return;
        }

        messageContainer.innerHTML = 'Searching...';
        messageContainer.style.display = 'block';
        resultsContainer.innerHTML = '';

        // Use Vercel serverless function proxy instead of direct TMDB to bypass SSL/TLS & CORS issues on older TVs
        var url = "/api/tmdb?path=search/multi&query=" + encodeURIComponent(query);
        ajaxGet(url, function(err, data) {
          if (err) {
            messageContainer.innerHTML = 'Error loading results: ' + (err.message || 'connection failed');
            messageContainer.style.display = 'block';
          } else {
            renderResults(data.results);
          }
        });
      }

      function handleInputChange() {
        var query = searchInput.value;
        if (timeoutId) {
          clearTimeout(timeoutId);
        }
        timeoutId = setTimeout(function() {
          performSearch(query);
        }, 600);
      }

      // Bind to all standard input events since virtual keyboards on TV browsers trigger varied events
      searchInput.oninput = handleInputChange;
      searchInput.onkeyup = handleInputChange;
      searchInput.onchange = handleInputChange;
      searchInput.onpropertychange = handleInputChange;

      window.onload = function() {
        searchInput.focus();
      };
    }
  </script>
</body>
</html>
