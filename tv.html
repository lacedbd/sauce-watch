<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sauce-Watch TV</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #000000;
      color: #ffffff;
      font-family: sans-serif;
      overflow-x: hidden;
    }
    
    .container {
      padding: 30px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    /* Search */
    .search-box {
      width: 90%;
      margin: 0 auto 40px auto;
    }
    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      font-size: 28px;
      border: 4px solid #444;
      border-radius: 8px;
      background-color: #222;
      color: #fff;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #FFFF00;
      background-color: #333;
    }

    /* Results */
    .results {
      text-align: left;
      padding-left: 5%;
      padding-right: 5%;
    }
    .card {
      display: inline-block;
      width: 220px;
      margin: 15px;
      border: 5px solid transparent;
      border-radius: 6px;
      background-color: #111;
      cursor: pointer;
      text-decoration: none;
      color: white;
      vertical-align: top;
      outline: none;
      text-align: center;
      transition: transform 0.2s;
    }
    .card:focus, .card:hover {
      border-color: #FFFF00;
      transform: scale(1.05);
      background-color: #333;
    }
    .card img {
      width: 100%;
      height: 330px;
      object-fit: cover;
      display: block;
    }
    .card .title {
      padding: 12px;
      font-size: 20px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message {
      font-size: 24px;
      color: #aaa;
      margin-top: 50px;
    }

    /* Player */
    #player-view {
      display: none;
      width: 100%;
      height: 100%;
      text-align: left;
    }
    .action-btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 24px;
      background-color: #333;
      color: #fff;
      text-decoration: none;
      border: 4px solid transparent;
      border-radius: 8px;
      margin: 10px;
      outline: none;
    }
    .action-btn:focus, .action-btn:hover {
      border-color: #FFFF00;
      background-color: #555;
    }
    .server-active {
      background-color: #005500;
      border-color: #00FF00;
    }
    iframe {
      width: 100%;
      height: 85%;
      min-height: 600px;
      border: none;
      background-color: #000;
    }
    
    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="search-view" class="container">
    <h1>Sauce-Watch TV</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movies or TV shows..." tabindex="1">
    </div>
    <div id="message" class="message">Type a movie or show to search...</div>
    <div id="results" class="results"></div>
  </div>

  <div id="player-view">
    <div style="padding: 10px; background: #111;">
      <a href="#" id="backBtn" class="action-btn" tabindex="1">Go Back</a>
      <a href="#" id="server-videasy" class="server-btn action-btn server-active" tabindex="1" onclick="return changeServer('videasy');">Videasy</a>
      <a href="#" id="server-vidlink" class="server-btn action-btn" tabindex="1" onclick="return changeServer('vidlink');">Yoru</a>
      <a href="#" id="server-embedsu" class="server-btn action-btn" tabindex="1" onclick="return changeServer('embedsu');">Cypher</a>
    </div>
    <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
  </div>

  <script>
    var API_KEY = "607bf14c16a8ab16f9ed61e6ba5920a7";
    var BASE_URL = "https://api.themoviedb.org/3";
    var IMG_BASE = "https://image.tmdb.org/t/p/w500";
    
    var searchView = document.getElementById('search-view');
    var playerView = document.getElementById('player-view');
    var videoPlayer = document.getElementById('videoPlayer');
    var searchInput = document.getElementById('searchInput');
    var resultsContainer = document.getElementById('results');
    var messageContainer = document.getElementById('message');
    var backBtn = document.getElementById('backBtn');
    
    var timeoutId = null;
    var lastFocusedElement = null;
    var currentMediaId = null;
    var currentMediaType = null;
    var currentServer = 'videasy';

    function getQueryParam(name) {
      var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
      return match && decodeURIComponent(match[1].replace(/\+/g, ' '));
    }

    function ajaxGet(url, callback) {
      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              callback(null, data);
            } catch (e) {
              callback(e, null);
            }
          } else {
            callback(new Error("Request failed with status " + xhr.status), null);
          }
        }
      };
      xhr.open("GET", url, true);
      xhr.send();
    }

    function getPlayerUrl(server, id, type) {
      if (server === 'vidlink') {
        return type === 'tv' ? 'https://vidlink.pro/tv/' + id + '/1/1' : 'https://vidlink.pro/movie/' + id;
      } else if (server === 'embedsu') {
        return type === 'tv' ? 'https://embed.su/embed/tv/' + id + '/1/1' : 'https://embed.su/embed/movie/' + id;
      }
      // default videasy
      return type === 'tv' ? 'https://player.videasy.net/tv/' + id + '/1/1' : 'https://player.videasy.net/movie/' + id;
    }

    function changeServer(serverName) {
      currentServer = serverName;
      document.getElementById('server-videasy').className = 'server-btn action-btn';
      document.getElementById('server-vidlink').className = 'server-btn action-btn';
      document.getElementById('server-embedsu').className = 'server-btn action-btn';
      document.getElementById('server-' + serverName).className = 'server-btn action-btn server-active';
      
      if (currentMediaId) {
        videoPlayer.src = getPlayerUrl(currentServer, currentMediaId, currentMediaType);
      }
      return false;
    }

    function showPlayer(id, type) {
      lastFocusedElement = document.activeElement;
      currentMediaId = id;
      currentMediaType = type;
      searchView.style.display = 'none';
      playerView.style.display = 'block';
      
      videoPlayer.src = getPlayerUrl(currentServer, id, type);
      backBtn.focus();
    }

    function closePlayer() {
      videoPlayer.src = '';
      playerView.style.display = 'none';
      searchView.style.display = 'block';
      if (lastFocusedElement) {
        try {
          lastFocusedElement.focus();
        } catch (e) {
          searchInput.focus();
        }
      } else {
        searchInput.focus();
      }
    }

    backBtn.onclick = function(e) {
      if (e && e.preventDefault) e.preventDefault();
      closePlayer();
      return false;
    };

    function renderResults(results) {
      resultsContainer.innerHTML = '';
      if (!results || results.length === 0) {
        messageContainer.innerHTML = 'No results found.';
        messageContainer.style.display = 'block';
        return;
      }
      
      messageContainer.style.display = 'none';

      var tabIndex = 2;
      for (var i = 0; i < results.length; i++) {
        var item = results[i];
        if (item.media_type === 'person') continue;
        
        var title = item.title || item.name || "Unknown";
        var imageUrl = item.poster_path ? (IMG_BASE + item.poster_path) : 'logo.jpg';
        var type = item.media_type || (item.title ? 'movie' : 'tv');
        
        var link = document.createElement('a');
        link.className = 'card';
        link.href = '#';
        link.tabIndex = tabIndex++;

        (function(id, t) {
          link.onclick = function(e) {
            if (e && e.preventDefault) e.preventDefault();
            showPlayer(id, t);
            return false;
          };
        })(item.id, type);

        var img = document.createElement('img');
        img.src = imageUrl;
        img.alt = title;

        var titleDiv = document.createElement('div');
        titleDiv.className = 'title';
        titleDiv.innerHTML = title;

        link.appendChild(img);
        link.appendChild(titleDiv);
        resultsContainer.appendChild(link);
      }
    }

    function performSearch(query) {
      if (!query || query.replace(/^\s+|\s+$/g, '') === '') {
        resultsContainer.innerHTML = '';
        messageContainer.innerHTML = 'Type a movie or show to search...';
        messageContainer.style.display = 'block';
        return;
      }

      messageContainer.innerHTML = 'Searching...';
      messageContainer.style.display = 'block';
      resultsContainer.innerHTML = '';

      var url = "/api/tmdb?path=search/multi&query=" + encodeURIComponent(query);
      ajaxGet(url, function(err, data) {
        if (err) {
          messageContainer.innerHTML = 'Error loading results: ' + (err.message || 'connection failed');
          messageContainer.style.display = 'block';
        } else {
          renderResults(data.results);
        }
      });
    }

    function handleInputChange() {
      var query = searchInput.value;
      if (timeoutId) {
        clearTimeout(timeoutId);
      }
      timeoutId = setTimeout(function() {
        performSearch(query);
      }, 600);
    }

    searchInput.oninput = handleInputChange;
    searchInput.onkeyup = handleInputChange;
    searchInput.onchange = handleInputChange;
    searchInput.onpropertychange = handleInputChange;

    window.onload = function() {
      searchInput.focus();

      var idParam = getQueryParam('id');
      var typeParam = getQueryParam('type') || 'movie';
      if (idParam) {
        showPlayer(idParam, typeParam);
      }
    };
  </script>
</body>
</html>
