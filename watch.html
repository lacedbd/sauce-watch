    <style>
        /* ──────── Apple Motion System (shared with index.html) ──────── */
        :root {
          --ea:    cubic-bezier(0.42, 0.00, 0.58, 1.00);
          --ea-de: cubic-bezier(0.00, 0.00, 0.20, 1.00);
          --ea-sp: cubic-bezier(0.28, 0.11, 0.32, 1.00);
          --t1: 180ms;
          --t2: 320ms;
          --t3: 500ms;
          --t4: 680ms;
        }

        .hero-gradient {
            background: linear-gradient(to top, rgba(9, 9, 11, 1) 0%, rgba(9, 9, 11, 0) 100%);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Static backdrop image - always visible, fades OUT when video starts playing */
        #backdropStatic {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: opacity 1.6s var(--ea);
            z-index: 2;
            pointer-events: none;
        }
        /* Video container - starts invisible, fades IN when confirmed PLAYING */
        #trailerPlayerContainer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.6s var(--ea), visibility 0s linear 1.6s;
            z-index: 1;
        }
        #trailerPlayerContainer.is-playing {
            opacity: 1;
            visibility: visible;
            transition: opacity 1.6s var(--ea), visibility 0s linear 0s;
        }
        #trailerPlayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        /* ── Hero focus/idle mode ── */
        #heroContent {
            transition:
              opacity   var(--t3) var(--ea-de),
              transform var(--t3) var(--ea-de);
        }
        #heroTitle {
            display: block;
            transform-origin: left bottom;
            transition: transform var(--t3) var(--ea-de);
            will-change: transform;
        }
        #heroMeta, #heroOverview {
            transition:
              opacity    var(--t2) var(--ea),
              max-height var(--t3) var(--ea-de),
              margin     var(--t2) var(--ea);
            overflow: hidden;
        }
        #heroButtons {
            transition: padding-top var(--t3) var(--ea-de);
        }
        /* focused = trailer playing, mouse idle — hide meta + desc, keep title + buttons */
        #heroSection.trailer-focused #heroMeta,
        #heroSection.trailer-focused #heroOverview {
            opacity: 0;
            max-height: 0 !important;
            margin: 0 !important;
            pointer-events: none;
        }
        /* Title shrinks smoothly via transform: scale */
        #heroSection.trailer-focused #heroTitle {
            transform: scale(0.65);
        }
        /* Tighten up buttons layout spacing in idle state */
        #heroSection.trailer-focused #heroButtons {
            padding-top: 0.75rem !important;
        }
        #heroTitleLogo {
            max-width: 85vw;
            max-height: 110px;
        }
        @media (min-width: 768px) {
            #heroTitleLogo {
                max-width: 480px;
                max-height: 160px;
            }
        }

        /* Recommendations grid card hover */
        .rec-card {
          will-change: transform;
          transition:
            transform    var(--t2) var(--ea-de),
            box-shadow   var(--t2) var(--ea),
            border-color var(--t2) var(--ea);
        }
        .rec-card:hover {
          transform: translateY(-3px);
          box-shadow:
            0 2px  8px rgba(0,0,0,0.22),
            0 8px 24px rgba(0,0,0,0.28),
            0 16px 36px rgba(0,0,0,0.16);
        }
        .rec-card:hover img {
          transform: scale(1.03);
        }
        .rec-card img {
          transition: transform var(--t3) var(--ea-de);
        }
        /* Episode & server buttons */
        .episode-btn, .server-btn {
          transition:
            background    var(--t1) var(--ea),
            border-color  var(--t1) var(--ea),
            color         var(--t1) var(--ea),
            transform     var(--t2) var(--ea-de);
        }
        /* Actor card hover */
        .actor-card {
          transition:
            transform  var(--t2) var(--ea-de),
            box-shadow var(--t2) var(--ea);
        }
        .actor-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 18px rgba(0,0,0,0.32);
        }
        /* Premium custom video player styles */
        #playerModal {
            background-color: #000 !important;
        }
        #playerPanelContent::-webkit-scrollbar {
            width: 4px;
        }
        #playerPanelContent::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 99px;
        }
        #playerPanelContent::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>

    <!-- JavaScript Player Engine -->
    <script>
        const TMDB_API_KEY = "607bf14c16a8ab16f9ed61e6ba5920a7";
        const TMDB_BASE = "https://api.themoviedb.org/3";
        const POSTER_BASE = "https://image.tmdb.org/t/p/w500";
        const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

        // ── fetchTMDB wrapper with Hybrid caching (Browser sessionStorage and Vercel CDN proxy) ──
        async function fetchTMDB(endpoint, queryParams = {}) {
            let path = endpoint;
            let params = { ...queryParams };
            
            if (endpoint.startsWith('http://') || endpoint.startsWith('https://')) {
                try {
                    const urlObj = new URL(endpoint);
                    path = urlObj.pathname.replace(/^\/3\//, '');
                    for (const [key, value] of urlObj.searchParams.entries()) {
                        if (key !== 'api_key') {
                            params[key] = value;
                        }
                    }
                } catch (e) {
                    console.error("URL parse error in fetchTMDB", e);
                }
            } else {
                path = path.replace(/^\//, '');
            }

            const searchParams = new URLSearchParams(params);
            const cacheKey = `tmdb_cache_${path}?${searchParams.toString()}`;

            // 1. Browser sessionStorage cache check
            try {
                const cached = sessionStorage.getItem(cacheKey);
                if (cached) {
                    const data = JSON.parse(cached);
                    return {
                        ok: true,
                        status: 200,
                        json: async () => data
                    };
                }
            } catch (e) {}

            let data = null;
            let ok = false;
            let status = 500;
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';

            // 2. Vercel Serverless CDN caching proxy check
            if (!isLocal) {
                const proxyParams = new URLSearchParams(params);
                proxyParams.set('path', path);
                try {
                    const res = await fetch(`/api/tmdb?${proxyParams.toString()}`);
                    if (res.ok) {
                        data = await res.json();
                        ok = true;
                        status = res.status;
                    }
                } catch (e) {
                    console.warn("Vercel proxy failed, falling back to direct TMDB request", e);
                }
            }

            // 3. Fallback: Direct TMDB request
            if (!data) {
                const directParams = new URLSearchParams(params);
                directParams.set('api_key', TMDB_API_KEY);
                try {
                    const res = await fetch(`${TMDB_BASE}/${path}?${directParams.toString()}`);
                    if (res.ok) {
                        data = await res.json();
                        ok = true;
                        status = res.status;
                    } else {
                        status = res.status;
                    }
                } catch (e) {
                    console.error("Direct fetch failed", e);
                }
            }

            // 4. Save to cache on success
            if (ok && data) {
                try {
                    sessionStorage.setItem(cacheKey, JSON.stringify(data));
                } catch (e) {}
            }

            return {
                ok,
                status,
                json: async () => data
            };
        }
        
        let currentMovieId = '';
        let currentType = 'movie';
        let activeSeasonNum = 1;
        let activeEpisodeNum = 1;


        function setupNativeTrailerPlayer(url) {
            const videoEl = document.getElementById('trailer-video');
            if (!videoEl || !url) return;
            videoEl.src = url;
            videoEl.muted = isMuted;
            videoEl.loop = true;
            
            // Once the video metadata / first frame loads, fade it in smoothly
            videoEl.onloadeddata = () => {
                const wrapper = document.getElementById('trailer-wrapper');
                const staticImg = document.getElementById('backdropStatic');
                if (wrapper) {
                    wrapper.style.transition = 'opacity 0.8s ease';
                    wrapper.style.opacity = '1';
                }
                if (staticImg) staticImg.style.opacity = '0';
                const volBtn = document.getElementById('trailerVolumeBtn');
                if (volBtn) volBtn.classList.remove('hidden');
                if (!trailerIsPlaying) enableHeroFocusMode();
            };

            videoEl.play().catch(err => {
                console.error("Native trailer autoplay failed:", err);
            });
        }

        let ytPlayer = null;
        let bgPlayTimeout = null;

        function setupYoutubeTrailerPlayer(ytKey) {
            const wrapper = document.getElementById('trailer-wrapper');
            if (!wrapper) return;
            
            // Remove the video element if it exists and replace with empty div for YouTube player and a transparent overlay to block click events from reaching the iframe
            wrapper.innerHTML = `
                <div id="youtube-player" class="w-full h-full pointer-events-none"></div>
                <div class="absolute inset-0 bg-transparent z-10 pointer-events-auto"></div>
            `;
            
            // Load YouTube Iframe API if not loaded
            if (!window.YT) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                const firstScriptTag = document.getElementsByTagName('script')[0];
                firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            }
            
            const checkYT = setInterval(() => {
                if (window.YT && window.YT.Player) {
                    clearInterval(checkYT);
                    ytPlayer = new YT.Player('youtube-player', {
                        videoId: ytKey,
                        width: '100%',
                        height: '100%',
                        playerVars: {
                            autoplay: 1, mute: 1, controls: 0, showinfo: 0,
                            rel: 0, iv_load_policy: 3, loop: 1,
                            playlist: ytKey, playsinline: 1,
                            disablekb: 1, fs: 0, modestbranding: 1
                        },
                        events: {
                            onReady: (e) => {
                                e.target.mute();
                                e.target.playVideo();
                                const iframe = e.target.getIframe();
                                if (iframe) {
                                    iframe.style.pointerEvents = 'none';
                                    iframe.classList.add('pointer-events-none');
                                }
                            },
                            onStateChange: (e) => {
                                if (e.data === YT.PlayerState.PLAYING) {
                                    clearTimeout(bgPlayTimeout);
                                    bgPlayTimeout = setTimeout(() => {
                                        const wrapper = document.getElementById('trailer-wrapper');
                                        const staticImg = document.getElementById('backdropStatic');
                                        if (wrapper) {
                                            wrapper.style.transition = 'opacity 0.8s ease';
                                            wrapper.style.opacity = '1';
                                        }
                                        if (staticImg) staticImg.style.opacity = '0';
                                        const volBtn = document.getElementById('trailerVolumeBtn');
                                        if (volBtn) volBtn.classList.remove('hidden');
                                        if (!trailerIsPlaying) enableHeroFocusMode();
                                    }, 4000);
                                } else {
                                    const wrapper = document.getElementById('trailer-wrapper');
                                    const staticImg = document.getElementById('backdropStatic');
                                    if (wrapper) wrapper.style.opacity = '0';
                                    if (staticImg) staticImg.style.opacity = '1';
                                    const volBtn = document.getElementById('trailerVolumeBtn');
                                    if (volBtn) volBtn.classList.add('hidden');
                                    
                                    if (e.data === YT.PlayerState.PAUSED) {
                                        e.target.playVideo();
                                    }
                                }
                            }
                        }
                    });
                }
            }, 100);
        }

        async function fetchAndSetupTrailerBackground() {
            try {
                const res = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}/videos`);
                const data = await res.json();
                const videos = data.results || [];
                const trailer = videos.find(v => v.site === 'YouTube' && v.type === 'Trailer') ||
                                videos.find(v => v.site === 'YouTube' && v.type === 'Teaser') ||
                                videos.find(v => v.site === 'YouTube');
                
                if (trailer) {
                    try {
                        const proxyRes = await fetch(`/api/trailer?id=${trailer.key}`);
                        const proxyData = await proxyRes.json();
                        if (proxyData && proxyData.url) {
                            setupNativeTrailerPlayer(proxyData.url);
                            return;
                        }
                    } catch (proxyErr) {
                        console.error("Proxy trailer fetch failed, falling back to YouTube:", proxyErr);
                    }
                    
                    // Fallback to YouTube Player directly
                    setupYoutubeTrailerPlayer(trailer.key);
                    return;
                }
            } catch (err) {
                console.error("Failed to load background trailer:", err);
            }
            
            // Clean Fallback: If no trailer exists or fetch failed, hide trailer UI & show static backdrop
            const staticImg = document.getElementById('backdropStatic');
            if (staticImg) staticImg.style.opacity = '1';
            const wrapper = document.getElementById('trailer-wrapper');
            if (wrapper) wrapper.style.opacity = '0';
            const volBtn = document.getElementById('trailerVolumeBtn');
            if (volBtn) volBtn.classList.add('hidden');
        }

        function saveToHistory() {
            try {
                let history = JSON.parse(localStorage.getItem('sw_history') || '[]');
                // Remove if already in history
                history = history.filter(item => !(item.id == currentMovieId && item.type == currentType));
                // Add to beginning
                const historyItem = {
                    id: currentMovieId,
                    type: currentType,
                    progress: Math.floor(Math.random() * 60) + 20
                };
                if (currentType === 'tv') {
                    historyItem.season = activeSeasonNum;
                    historyItem.episode = activeEpisodeNum;
                }
                history.unshift(historyItem);
                // Keep only last 20
                history = history.slice(0, 20);
                localStorage.setItem('sw_history', JSON.stringify(history));
            } catch (err) {
                console.error("Failed to save to history:", err);
            }
        }

        function renderEpisodes() {
            const grid = document.getElementById('episodeGrid');
            const searchQuery = document.getElementById('episodeSearchInput')?.value.toLowerCase().trim() || '';
            grid.innerHTML = '';

            // Filter episodes
            let filtered = allEpisodes.filter(ep => {
                const titleMatch = ep.name?.toLowerCase().includes(searchQuery);
                const overviewMatch = ep.overview?.toLowerCase().includes(searchQuery);
                const epNumMatch = String(ep.episode_number) === searchQuery;
                return titleMatch || overviewMatch || epNumMatch;
            });

            // Sort episodes
            filtered.sort((a, b) => {
                if (episodeSortOrder === 'asc') {
                    return a.episode_number - b.episode_number;
                } else {
                    return b.episode_number - a.episode_number;
                }
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="py-12 text-center text-zinc-500 text-sm">No episodes found.</div>';
                return;
            }

            filtered.forEach(ep => {
                const selectEl = document.getElementById('seasonSelect');

            "475557": "Won 2 Academy Awards (including Best Actor for Joaquin Phoenix).",
            "194": "Nominated for 5 Academy Awards and won 4 BAFTA Awards.",
            "274": "Won 5 Academy Awards (The Big Five, including Best Picture, Best Director, Best Actor, and Best Actress).",
            "11": "Won 6 Academy Awards and a Special Achievement Award.",
            "769": "Won the Academy Award for Best Supporting Actor for Joe Pesci.",
            "550": "Nominated for the Academy Award for Best Sound Editing.",
            "1891": "Won the Academy Award for Best Sound and a Special Achievement Award.",
            "603": "Won 4 Academy Awards (including Best Visual Effects and Best Sound).",
            "510": "Won 5 Academy Awards (The Big Five, including Best Picture, Best Director, Best Actor, and Best Actress)."
        };

        async function showMovieAwards() {
            const container = document.getElementById('awardsSection');
            const textEl = document.getElementById('movieAwardsText');
            if (!container || !textEl) return;

            // 1. Check if we have hardcoded details for this movie
            if (currentType === 'movie' && AWARDS_MAP[currentMovieId]) {
                textEl.innerText = AWARDS_MAP[currentMovieId];
                container.classList.remove('hidden');
                return;
            }

            // 2. Otherwise query TMDB keywords to detect general award status
            try {
                const res = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}/keywords?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                const keywords = data.keywords || data.results || [];
                const hasAwardKeyword = keywords.some(k => {
                    const name = (k.name || '').toLowerCase();
                    return name.includes('oscar') || name.includes('academy award') || name.includes('golden globe') || name.includes('award winner') || name.includes('bafta');
                });

                if (hasAwardKeyword) {
                    textEl.innerText = "Recognized as a prestigious award nominee / winner for its cinematic excellence.";
                    container.classList.remove('hidden');
                } else {
                    container.classList.add('hidden');
                }
            } catch (err) {
                console.error("Failed to query movie awards:", err);
            }
        }

        // Initialize and Setup Page Layout
        async function loadPlayerEngine() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMovieId = urlParams.get('id');
            currentType = urlParams.get('type') || 'movie';

            if (!currentMovieId) {
                alert("No Movie/Show ID specified. Returning to catalog.");
                window.location.href = "index.html";
                return;
            }

            // TV Specific layout setups
            if (currentType === 'tv') {
                document.getElementById('tvSelectorContainer').classList.remove('hidden');
                document.getElementById('jumpToEpisodesBtn').classList.remove('hidden');
                
                // Link "Episodes" jump button
                document.getElementById('jumpToEpisodesBtn').addEventListener('click', () => {
                    document.getElementById('tvSelectorContainer').scrollIntoView({ behavior: 'smooth' });
                });

                // Load from history if available to resume at last watched season/episode
                try {
                    const history = JSON.parse(localStorage.getItem('sw_history') || '[]');
                    const lastWatched = history.find(item => item.id == currentMovieId && item.type === 'tv');
                    if (lastWatched) {
                        activeSeasonNum = lastWatched.season || 1;
                        activeEpisodeNum = lastWatched.episode || 1;
                    }
                } catch(e) {}
            }

            // Link "Similars" jump button
            document.getElementById('jumpToSimilarBtn').addEventListener('click', () => {
                document.getElementById('recommendationsSection').scrollIntoView({ behavior: 'smooth' });
            });

            // Set main Play button listener
            document.getElementById('mainPlayBtn').addEventListener('click', () => {
                if (currentType === 'tv') {
                    // TV shows: scroll to episode list or play first episode
                    document.getElementById('tvSelectorContainer').scrollIntoView({ behavior: 'smooth' });
                } else {
                    openPlayerModal();
                }
            });

            // Set background trailer
            fetchAndSetupTrailerBackground();

            try {
                // Fetch Main metadata details
                const res = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}?api_key=${TMDB_API_KEY}`);
                const data = await res.json();

                if (data) {
                    const title = data.title || data.name;
                    const releaseDate = data.release_date || data.first_air_date || "";
                    const year = releaseDate ? releaseDate.split('-')[0] : "N/A";
                    const runtime = data.runtime ? `${data.runtime}m` : (data.episode_run_time ? `${data.episode_run_time[0]}m` : "N/A");
                    const genresList = (data.genres || []).map(g => g.name).join(", ");
                    
                    document.title = `Watching ${title} - sauce.watch`;
                    
                    // Fetch logo images
                    let logoUrl = null;
                    try {
                        const imagesRes = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}/images?api_key=${TMDB_API_KEY}`);
                        const imagesData = await imagesRes.json();
                        const logos = imagesData.logos || [];
                        const englishLogo = logos.find(l => l.iso_639_1 === 'en');
                        const logoToUse = englishLogo || logos[0];
                        if (logoToUse && logoToUse.file_path) {
                            logoUrl = `https://image.tmdb.org/t/p/w500${logoToUse.file_path}`;
                        }
                    } catch (err) {
                        console.error("Failed to fetch logo:", err);
                    }

                    const titleTextEl = document.getElementById('heroTitleText');
                    const titleLogoEl = document.getElementById('heroTitleLogo');

                    if (logoUrl) {
                        titleLogoEl.src = logoUrl;
                        titleLogoEl.alt = title;
                        titleLogoEl.classList.remove('hidden');
                        titleTextEl.classList.add('hidden');
                    } else {
                        titleTextEl.innerText = title;
                        titleTextEl.classList.remove('hidden');
                        titleLogoEl.classList.add('hidden');
                    }
                    
                    document.getElementById('heroOverview').innerText = data.overview || "No description found.";
                    document.getElementById('movieYear').innerText = year;
                    document.getElementById('movieRuntime').innerText = runtime;
                    document.getElementById('movieGenres').innerText = genresList || "N/A";
                    
                    generalShowRuntime = data.runtime || (data.episode_run_time ? data.episode_run_time[0] : null);
                    if (data.backdrop_path) {
                        showBackdropPath = data.backdrop_path;
                        // Set the static image that shows while video loads
                        const staticImg = document.getElementById('backdropStatic');
                        if (staticImg) staticImg.src = `${BACKDROP_BASE}${data.backdrop_path}`;
                    }

                    // TV Specific: Populate seasons options
                    if (currentType === 'tv' && data.seasons) {
                        const select = document.getElementById('seasonSelect');
                        select.innerHTML = '';
                        const validSeasons = data.seasons.filter(s => s.season_number > 0);
                        validSeasons.forEach(s => {
                            const opt = document.createElement('option');
                            opt.value = s.season_number;
                            opt.textContent = `Season ${s.season_number}`;
                            select.appendChild(opt);
                        });

                        select.addEventListener('change', (e) => {
                            activeSeasonNum = parseInt(e.target.value);
                            // Reset search query when switching seasons
                            const searchInput = document.getElementById('episodeSearchInput');
                            if (searchInput) searchInput.value = '';
                            fetchEpisodes(e.target.value);
                        });

                        // Set up search and sort listeners once
                        const searchInput = document.getElementById('episodeSearchInput');
                        if (searchInput) {
                            searchInput.removeEventListener('input', renderEpisodes);
                            searchInput.addEventListener('input', renderEpisodes);
                        }

                        const sortBtn = document.getElementById('episodeSortBtn');
                        if (sortBtn) {
                            sortBtn.removeEventListener('click', toggleSortOrder);
                            sortBtn.addEventListener('click', toggleSortOrder);
                        }

                        // Check if activeSeasonNum is valid, otherwise default to first
                        const hasActiveSeason = validSeasons.some(s => s.season_number === activeSeasonNum);
                        if (!hasActiveSeason && validSeasons.length > 0) {
                            activeSeasonNum = validSeasons[0].season_number;
                        }
                        select.value = activeSeasonNum;
                        fetchEpisodes(activeSeasonNum);
                    }
                    
                    document.getElementById('movieRating').innerText = data.vote_average ? data.vote_average.toFixed(1) : "0.0";
                    document.getElementById('movieRtScore').innerText = data.vote_average ? Math.round(data.vote_average * 10) : "0";
                    
                    showMovieAwards();
                    
                    // Fade in the hero content block now that everything is populated
                    const heroContent = document.getElementById('heroContent');
                    if (heroContent) heroContent.classList.remove('opacity-0');
                }

                // Fetch Cast credits
                fetchCredits();

                // Initialize recommendations (infinite scroll)
                initRecommendations();

                // Initialize custom player listeners
                initPlayerControllers();

            } catch (err) {
                console.error("Details API pipeline failed:", err);
            }
        }

        // Fetch Actors and Profiles
        async function fetchCredits() {
            try {
                const res = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}/credits?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                const carousel = document.getElementById('castCarousel');
                carousel.innerHTML = '';
                
                const cast = (data.cast || []).slice(0, 15);
                if (cast.length > 0) {
                    document.getElementById('castSection').classList.remove('hidden');
                    cast.forEach(actor => {
                        const card = document.createElement('a');
                        card.href = `actor.html?id=${actor.id}`;
                        card.className = "min-w-[120px] max-w-[120px] bg-white/5 border border-white/5 rounded-2xl overflow-hidden text-center p-3 hover:border-white/30 hover:bg-white/10 transition-all flex flex-col items-center shadow-lg cursor-pointer";
                        
                        const profileUrl = actor.profile_path 
                            ? `https://image.tmdb.org/t/p/w185${actor.profile_path}` 
                            : `https://ui-avatars.com/api/?name=${encodeURIComponent(actor.name)}&background=27272a&color=fff&size=128`;

                        card.innerHTML = `
                            <img src="${profileUrl}" class="w-16 h-16 object-cover rounded-full border border-white/10 mb-2 shadow" alt="${actor.name}" />
                            <h4 class="text-xs font-bold text-white truncate w-full">${actor.name}</h4>
                            <p class="text-[10px] text-gray-400 truncate w-full mt-0.5">${actor.character || "Actor"}</p>
                        `;
                        carousel.appendChild(card);
                    });
                }
            } catch (err) {
                console.error("Cast fetch failed:", err);
            }
        }

        // Recommendations Pagination State
        let currentRecPage = 1;
        let isFetchingRecs = false;
        let hasMoreRecs = true;

        async function initRecommendations() {
            // Setup Intersection Observer for Infinite Scroll
            const trigger = document.getElementById('loadMoreTrigger');
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && hasMoreRecs && !isFetchingRecs) {
                    loadNextRecommendationsPage();
                }
            }, { rootMargin: '200px' });
            observer.observe(trigger);

            // Load first page immediately
            await loadNextRecommendationsPage();
        }

        async function loadNextRecommendationsPage() {
            if (isFetchingRecs || !hasMoreRecs) return;
            isFetchingRecs = true;
            document.getElementById('loadingSpinner').classList.remove('hidden');

            try {
                let res = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}/recommendations?api_key=${TMDB_API_KEY}&page=${currentRecPage}`);
                let data = await res.json();
                
                // If recommendations are empty, fallback to 'similar' endpoint to keep infinite scroll going
                if (!data.results || data.results.length === 0) {
                    res = await fetchTMDB(`${TMDB_BASE}/${currentType}/${currentMovieId}/similar?api_key=${TMDB_API_KEY}&page=${currentRecPage}`);
                    data = await res.json();
                }

                const grid = document.getElementById('recommendationsGrid');
                const items = data.results || [];
                
                if (items.length === 0 || currentRecPage >= data.total_pages) {
                    hasMoreRecs = false;
                }

                if (items.length > 0) {
                    document.getElementById('recommendationsSection').classList.remove('hidden');
                    
                    items.forEach(item => {
                        // Use poster_path for vertical layout
                        if (!item.poster_path) return;
                        
                        const type = item.media_type || currentType;
                        const card = document.createElement('a');
                        card.href = `watch.html?id=${item.id}&type=${type}`;
                        card.className = "flex flex-col gap-2 group cursor-pointer w-full transition-all duration-300 hover:-translate-y-1.5";
                        
                        const rating = item.vote_average ? item.vote_average.toFixed(1) : "0.0";
                        const title = item.title || item.name;
                        const dateText = item.release_date || item.first_air_date || "";
                        const year = dateText ? dateText.split('-')[0] : "";
                        const typeLabel = type === 'tv' ? 'TV Show' : 'Movie';

                        const rtScore = Math.round(item.vote_average * 10);

                        card.innerHTML = `
                            <div class="relative w-full aspect-[2/3] rounded-xl overflow-hidden bg-zinc-900 border border-white/5 group-hover:border-white/20 transition-all duration-300 shadow-lg group-hover:shadow-2xl group-hover:shadow-black/60">
                                <img src="${POSTER_BASE}${item.poster_path}" alt="${title}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                <img id="logo-${item.id}" src="" class="absolute bottom-4 left-1/2 -translate-x-1/2 w-4/5 max-h-[40px] object-contain filter drop-shadow-[0_4px_10px_rgba(0,0,0,0.85)] hidden z-10 pointer-events-none transition-opacity duration-500">
                                <div class="absolute inset-0 flex justify-center items-center opacity-0 transition-opacity z-20 pointer-events-none" id="hover-spinner-${item.id}">
                                    <div class="w-8 h-8 border-2 border-white/20 border-t-red-600 rounded-full animate-spin"></div>
                                </div>
                                <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md rounded px-1.5 py-0.5 text-[10px] font-bold text-white flex items-center gap-1 opacity-0 transition-opacity z-10" id="volIcon-${item.id}">
                                    <i class="fas fa-volume-mute text-xs"></i>
                                </div>
                                <!-- Native HTML5 hover trailer -->
                                <div id="trailer-wrapper-${item.id}" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-0 transition-opacity duration-300" style="opacity: 0.01;">
                                    <video id="trailer-player-${item.id}" class="w-full h-full object-cover pointer-events-none" loop muted playsinline></video>
                                </div>
                            </div>
                            <div class="px-1 mt-2">
                                <h5 class="font-bold text-sm text-white truncate w-full group-hover:text-red-400 transition-colors">${title}</h5>
                                <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-[11px] text-zinc-400 font-medium mt-1">
                                    <span class="text-yellow-500 font-bold flex items-center gap-1.5"><i class="fas fa-star text-[10px]"></i> ${rating}</span>
                                    <span class="text-white font-bold flex items-center gap-1.5"><img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f345.svg" class="w-[11px] h-[11px] drop-shadow-sm" alt="RT"> ${rtScore}%</span>
                                    <span class="flex items-center gap-1.5 opacity-60">
                                        ${year ? `<span>${year}</span><span class="opacity-40">•</span>` : ''}
                                        <span>${typeLabel}</span>
                                    </span>
                                </div>
                            </div>
                        `;

                        // Fetch Logo dynamically
                        fetchTMDB(`${TMDB_BASE}/${type}/${item.id}/images?api_key=${TMDB_API_KEY}`)
                            .then(res => res.json())
                            .then(imagesData => {
                                const logos = imagesData.logos || [];
                                const englishLogo = logos.find(l => l.iso_639_1 === 'en');
                                const logoToUse = englishLogo || logos[0];
                                if (logoToUse && logoToUse.file_path) {
                                    const logoImg = card.querySelector(`#logo-${item.id}`);
                                    logoImg.src = `https://image.tmdb.org/t/p/w500${logoToUse.file_path}`;
                                    logoImg.classList.remove('hidden');
                                }
                            }).catch(console.error);

                        // Add Hover Trailer Logic (only on desktop/non-touch)
                        if (!('ontouchstart' in window)) {
                            let hoverTimer = null;
                            let cardVideoEl = null;
                            let cardYtPlayer = null;
                            let playTimeout = null;
                            const trailerWrapper = card.querySelector(`#trailer-wrapper-${item.id}`);
                            const videoPlayer = card.querySelector(`#trailer-player-${item.id}`);
                            const volIcon = card.querySelector(`#volIcon-${item.id}`);
                            const spinner = card.querySelector(`#hover-spinner-${item.id}`);
                            const cardLogo = card.querySelector(`#logo-${item.id}`);

                            function loadYoutubeHoverTrailer(ytKey) {
                                 trailerWrapper.innerHTML = `
                                     <div id="yt-hover-${item.id}" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400%] h-[150%] max-w-none pointer-events-none"></div>
                                     <div class="absolute inset-0 bg-transparent z-10 pointer-events-auto"></div>
                                 `;
                                 
                                 if (!window.YT) {
                                     const tag = document.createElement('script');
                                     tag.src = "https://www.youtube.com/iframe_api";
                                     const firstScriptTag = document.getElementsByTagName('script')[0];
                                     firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                                 }
                                 
                                 const checkYT = setInterval(() => {
                                     if (window.YT && window.YT.Player) {
                                         clearInterval(checkYT);
                                         if (!card.matches(':hover')) return; // Abort if user left
                                         
                                         cardYtPlayer = new YT.Player(`yt-hover-${item.id}`, {
                                             videoId: ytKey,
                                             width: '100%',
                                             height: '100%',
                                             playerVars: {
                                                 autoplay: 1, mute: 1, controls: 0, showinfo: 0,
                                                 rel: 0, iv_load_policy: 3, loop: 1,
                                                 playlist: ytKey, playsinline: 1,
                                                 disablekb: 1, fs: 0, modestbranding: 1, vq: 'small'
                                             },
                                             events: {
                                                 onReady: (e) => {
                                                     e.target.mute();
                                                     e.target.playVideo();
                                                     const iframe = e.target.getIframe();
                                                     if (iframe) {
                                                         iframe.style.pointerEvents = 'none';
                                                         iframe.style.position = 'absolute';
                                                         iframe.style.top = '50%';
                                                         iframe.style.left = '50%';
                                                         iframe.style.transform = 'translate(-50%, -50%)';
                                                         iframe.style.width = '400%';
                                                         iframe.style.height = '150%';
                                                         iframe.style.maxWidth = 'none';
                                                         iframe.classList.add('absolute', 'top-1/2', 'left-1/2', '-translate-x-1/2', '-translate-y-1/2', 'w-[400%]', 'h-[150%]', 'max-w-none', 'pointer-events-none');
                                                     }
                                                 },
                                                 onStateChange: (e) => {
                                                     if (e.data === YT.PlayerState.PLAYING) {
                                                         playTimeout = setTimeout(() => {
                                                             if (card.matches(':hover') && trailerWrapper) {
                                                                 trailerWrapper.style.transition = 'opacity 0.5s ease';
                                                                 trailerWrapper.style.opacity = '1';
                                                                 volIcon.classList.remove('opacity-0');
                                                                 spinner.classList.add('opacity-0');
                                                                 if (cardLogo) cardLogo.classList.add('opacity-0');
                                                             }
                                                         }, 4000);
                                                     } else {
                                                         clearTimeout(playTimeout);
                                                         if (trailerWrapper) {
                                                             trailerWrapper.style.opacity = '0.01';
                                                         }
                                                         if (volIcon) {
                                                             volIcon.classList.add('opacity-0');
                                                         }
                                                         if (cardLogo) {
                                                             cardLogo.classList.remove('opacity-0');
                                                         }
                                                         if (e.data === YT.PlayerState.PAUSED) {
                                                             e.target.playVideo();
                                                         }
                                                     }
                                                 }
                                             }
                                         });
                                     }
                                 }, 100);
                             }

                            card.addEventListener('mouseenter', () => {
                                hoverTimer = setTimeout(async () => {
                                    if (cardVideoEl || cardYtPlayer) {
                                        trailerWrapper.style.opacity = '1';
                                        volIcon.classList.remove('opacity-0');
                                        if (cardLogo) cardLogo.classList.add('opacity-0');
                                        return;
                                    }
                                    
                                    spinner.classList.remove('opacity-0');
                                    
                                    try {
                                        const vidRes = await fetchTMDB(`${TMDB_BASE}/${type}/${item.id}/videos`);
                                        const vidData = await vidRes.json();
                                        const vids = vidData.results || [];
                                        const trailer = vids.find(v => v.type === 'Trailer' && v.site === 'YouTube') || vids.find(v => v.site === 'YouTube');
                                        
                                        if (trailer) {
                                            try {
                                                const proxyRes = await fetch(`/api/trailer?id=${trailer.key}`);
                                                const proxyData = await proxyRes.json();
                                                
                                                if (proxyData && proxyData.url) {
                                                    videoPlayer.src = proxyData.url;
                                                    cardVideoEl = videoPlayer;
                                                    
                                                    videoPlayer.onloadeddata = () => {
                                                        if (card.matches(':hover') && trailerWrapper) {
                                                            trailerWrapper.style.transition = 'opacity 0.5s ease';
                                                            trailerWrapper.style.opacity = '1';
                                                            volIcon.classList.remove('opacity-0');
                                                            spinner.classList.add('opacity-0');
                                                            if (cardLogo) cardLogo.classList.add('opacity-0');
                                                        }
                                                    };

                                                    videoPlayer.play().catch(e => {
                                                        console.error("Card trailer autoplay failed:", e);
                                                        spinner.classList.add('opacity-0');
                                                    });
                                                    return;
                                                }
                                            } catch (proxyErr) {
                                                console.error("Failed to load card hover proxy stream, falling back to YouTube:", proxyErr);
                                            }
                                            loadYoutubeHoverTrailer(trailer.key);
                                        } else {
                                            spinner.classList.add('opacity-0');
                                        }
                                    } catch (err) {
                                        console.error('Failed to load card hover trailer:', err);
                                        spinner.classList.add('opacity-0');
                                    }
                                }, 500); // 500ms hover intent delay
                            });

                            card.addEventListener('mouseleave', () => {
                                clearTimeout(hoverTimer);
                                clearTimeout(playTimeout);
                                spinner.classList.add('opacity-0');
                                if (cardLogo) cardLogo.classList.remove('opacity-0');
                                trailerWrapper.style.transition = 'none';
                                trailerWrapper.style.opacity = '0.01';
                                volIcon.classList.add('opacity-0');
                                if (cardVideoEl) {
                                    cardVideoEl.pause();
                                    cardVideoEl.src = '';
                                    cardVideoEl = null;
                                }
                                if (cardYtPlayer && typeof cardYtPlayer.destroy === 'function') {
                                    cardYtPlayer.destroy();
                                    cardYtPlayer = null;
                                    trailerWrapper.innerHTML = `<video id="trailer-player-${item.id}" class="w-full h-full object-cover pointer-events-none" loop muted playsinline></video>`;
                                }
                            });
                        }

                        grid.appendChild(card);
                    });
                }
                currentRecPage++;
            } catch (err) {
                console.error("Recommendations pagination failed:", err);
            } finally {
                isFetchingRecs = false;
                document.getElementById('loadingSpinner').classList.add('hidden');
            }
        }

        // ── Hero idle/focus mode ──
        // Once trailer is playing, if mouse is idle for 3s → collapse UI to show trailer cleanly
        // Any mouse movement instantly restores the full UI
        let heroIdleTimer = null;
        let trailerIsPlaying = false;

        function enableHeroFocusMode() {
            trailerIsPlaying = true;
            const hero = document.getElementById('heroSection');
            
            // Listen for any user activity to wake up the UI
            hero.addEventListener('mousemove', onUserActivity);
            hero.addEventListener('touchstart', onUserActivity, {passive: true});
            hero.addEventListener('click', onUserActivity);
            
            hero.addEventListener('mouseleave', onHeroMouseLeave);
            
            // Start the idle timer immediately so it fades out if the user does nothing
            onUserActivity();
        }

        function onUserActivity() {
            const hero = document.getElementById('heroSection');
            // User interacted — show full UI immediately
            hero.classList.remove('trailer-focused');
            clearTimeout(heroIdleTimer);
            // After 3s of no interaction, collapse to focused mode
            heroIdleTimer = setTimeout(() => {
                if (trailerIsPlaying) hero.classList.add('trailer-focused');
            }, 3000);
        }

        function onHeroMouseLeave() {
            const hero = document.getElementById('heroSection');
            clearTimeout(heroIdleTimer);
            hero.classList.remove('trailer-focused');
        }

        window.addEventListener('DOMContentLoaded', loadPlayerEngine);
    </script>
