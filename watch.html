<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watching - sauce.watch</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hero-gradient {
            background: linear-gradient(to top, rgba(9, 9, 11, 1) 0%, rgba(9, 9, 11, 0) 100%);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Static backdrop image - always visible, fades OUT when video starts playing */
        #backdropStatic {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: opacity 1.5s ease;
            z-index: 2;
            pointer-events: none;
        }
        /* Video container - starts invisible, fades IN when confirmed PLAYING */
        #trailerPlayerContainer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease, visibility 0s linear 1.5s;
            z-index: 1;
        }
        #trailerPlayerContainer.is-playing {
            opacity: 1;
            visibility: visible;
            transition: opacity 1.5s ease, visibility 0s linear 0s;
        }
        #trailerPlayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        /* ── Hero focus/idle mode ── */
        #heroContent {
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #heroTitle {
            display: block;
            transform-origin: left bottom;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }
        #heroMeta, #heroOverview {
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        max-height 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        margin 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }
        #heroButtons {
            transition: padding-top 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* focused = trailer playing, mouse idle — hide meta + desc, keep title + buttons */
        #heroSection.trailer-focused #heroMeta,
        #heroSection.trailer-focused #heroOverview {
            opacity: 0;
            max-height: 0 !important;
            margin: 0 !important;
            pointer-events: none;
        }
        /* Title shrinks smoothly via transform: scale */
        #heroSection.trailer-focused #heroTitle {
            transform: scale(0.65);
        }
        /* Tighten up buttons layout spacing in idle state */
        #heroSection.trailer-focused #heroButtons {
            padding-top: 0.75rem !important;
        }
        #heroTitleLogo {
            max-width: 85vw;
            max-height: 110px;
        }
        @media (min-width: 768px) {
            #heroTitleLogo {
                max-width: 480px;
                max-height: 160px;
            }
        }
    </style>
    <!-- AD TAGS PLACEHOLDER (Paste Adsterra tags here to monetize the player page) -->
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans antialiased overflow-x-hidden select-none">

    <!-- Back Button (Absolute Top Left) -->
    <a href="index.html" class="absolute top-8 left-8 z-[110] bg-black/60 hover:bg-black/80 w-10 h-10 rounded-full flex items-center justify-center border border-white/10 text-white transition-all shadow-lg">
        <i class="fas fa-chevron-left text-sm"></i>
    </a>

    <!-- Floating Audio Toggle Button (Absolute Top Right) -->
    <button id="trailerVolumeBtn" class="hidden absolute top-8 right-8 z-[110] bg-black/60 hover:bg-black/80 w-10 h-10 rounded-full flex items-center justify-center border border-white/10 text-white transition-all shadow-lg">
        <i id="volumeIcon" class="fas fa-volume-mute text-sm"></i>
    </button>

    <!-- Details Hero Section (Immersive Background) -->
    <section id="heroSection" class="relative h-screen w-full overflow-hidden bg-zinc-950 flex items-end">
        <!-- The Cinematic Background Wrapper -->
        <div id="ambientBackdrop" class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none z-0">
            <!-- Scaled container to push UI out of bounds. Hidden initially with 0.01 opacity to bypass iOS Safari rendering block. -->
            <div id="trailer-wrapper" class="absolute top-1/2 left-1/2 w-[200vw] h-[200vh] md:w-[150vw] md:h-[150vh] -translate-x-1/2 -translate-y-1/2 z-0 transition-opacity duration-1000" style="opacity: 0.01;">
                <!-- The API will inject the iframe right here -->
                <div id="youtube-player" class="w-full h-full pointer-events-none"></div>
            </div>
        </div>

        <!-- Layer 2 (top): Static backdrop image - always visible, fades out when video plays -->
        <img id="backdropStatic" src="" alt="" />

        <!-- Gradient overlays -->
        <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/20 to-transparent z-10 pointer-events-none"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-zinc-950/40 via-transparent to-transparent z-10 pointer-events-none"></div>

        <!-- Overlaid text & options details -->
        <div id="heroContent" class="relative z-20 max-w-4xl px-6 md:px-12 pb-4 md:pb-8 space-y-3 md:space-y-4 opacity-0 transition-opacity duration-700">
            <div id="heroTitle" class="block">
                <h1 id="heroTitleText" class="text-3xl md:text-6xl font-black uppercase tracking-tighter text-white drop-shadow-lg leading-none"></h1>
                <img id="heroTitleLogo" class="hidden max-h-[90px] md:max-h-[160px] w-auto object-contain filter drop-shadow-[0_4px_12px_rgba(0,0,0,0.5)]" src="" alt="" />
            </div>
            
            <!-- Metadata details row -->
            <div id="heroMeta" class="flex flex-wrap items-center gap-3 text-xs md:text-sm text-gray-300 font-medium">
                <span class="text-red-500 font-bold flex items-center gap-1">★ <span id="movieRating"></span></span>
                <span class="opacity-40">•</span>
                <span id="movieYear"></span>
                <span class="opacity-40">•</span>
                <span id="movieRuntime"></span>
                <span class="opacity-40">•</span>
                <span id="movieGenres"></span>
            </div>

            <!-- Plot overview description -->
            <p id="heroOverview" class="text-zinc-300 text-sm md:text-base leading-relaxed max-w-2xl mt-4 line-clamp-3">
            </p>

            <!-- Pill options buttons row -->
            <div id="heroButtons" class="flex items-center gap-3 pt-6 flex-wrap">
                <button id="mainPlayBtn" class="bg-white hover:bg-zinc-200 text-black px-8 py-3 rounded-full font-bold flex items-center gap-2 transition-all transform hover:scale-105 active:scale-95 shadow-xl">
                    <i class="fas fa-play"></i> Play
                </button>
                <button class="w-11 h-11 rounded-full border border-white/20 hover:bg-white/10 flex items-center justify-center text-white transition-all text-sm" title="Add to Library">
                    <i class="fas fa-plus"></i>
                </button>
                <button id="jumpToEpisodesBtn" class="hidden bg-white/10 hover:bg-white/20 border border-white/10 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-all text-sm shadow">
                    <i class="fas fa-list-ol"></i> Episodes

                <button id="jumpToSimilarBtn" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 transition-all text-sm shadow">
                    <i class="fas fa-thumbs-up"></i> Similars

    </section>

    <!-- Main Content Area -->
    <main class="relative z-10 px-6 md:px-12 py-8 space-y-12 max-w-[1440px] mx-auto w-full">
        
        <!-- TV Episodes Selector Container (Shown only for TV Shows) -->
        <div id="tvSelectorContainer" class="hidden bg-white/5 border border-white/10 rounded-2xl p-6 space-y-6">
            <div class="flex items-center justify-between border-b border-white/5 pb-4 flex-wrap gap-3">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-list-ol text-blue-500"></i> Episodes
                </h3>
                <select id="seasonSelect" class="bg-zinc-900 border border-zinc-800 text-sm text-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-zinc-700 transition">
                    <!-- Populated dynamically -->
                </select>
            </div>
            <!-- Episode Button Grid -->
            <div id="episodeGrid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3 max-h-[250px] overflow-y-auto scrollbar-hide pr-1">
                <!-- Populated dynamically -->
            </div>
        </div>

        <!-- Actors / Cast members Section -->
        <section id="castSection" class="space-y-6 hidden">
            <div class="flex items-center gap-2 border-l-2 border-red-600 pl-3">
                <h2 class="text-2xl font-bold text-white">Actors</h2>
            </div>
            <div id="castCarousel" class="flex gap-4 overflow-x-auto scrollbar-hide pb-4">
                <!-- Injected dynamically -->
            </div>
        </section>

        <!-- Recommendations Section (Infinite Scroll) -->
        <section id="recommendationsSection" class="space-y-6 hidden pb-12">
            <div class="flex items-center gap-2 border-l-2 border-red-600 pl-3">
                <h2 class="text-2xl font-bold text-white">You may like</h2>
            </div>
            <!-- Changed grid to better fit landscape cards -->
            <div id="recommendationsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Injected dynamically -->
            </div>
            <!-- Invisible trigger element for IntersectionObserver -->
            <div id="loadMoreTrigger" class="h-10 w-full flex justify-center items-center">
                <div id="loadingSpinner" class="hidden w-8 h-8 border-4 border-zinc-800 border-t-red-600 rounded-full animate-spin"></div>
            </div>
        </section>
    </main>

    <!-- Streaming Modal Player Overlay (Cinema Mode) -->
    <div id="playerModal" class="hidden fixed inset-0 z-[200] bg-zinc-950/95 backdrop-blur-md flex flex-col justify-center items-center p-4">
        <!-- Close button -->
        <button id="closePlayerBtn" class="absolute top-6 right-6 text-white hover:text-red-500 transition-colors text-2xl">
            <i class="fas fa-times"></i>
        </button>

        <div class="w-full max-w-5xl space-y-6">
            <!-- Video Frame Container -->
            <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-black border border-white/10 shadow-2xl">
                <iframe id="videoPlayer" 
                        src="" 
                        class="absolute inset-0 w-full h-full" 
                        allowfullscreen 
                        scrolling="no" 
                        frameborder="0" 
                        sandbox="allow-scripts allow-same-origin allow-forms"
                        allow="autoplay; encrypted-media; picture-in-picture">
                </iframe>
            </div>

            <!-- Server Switcher Row -->
            <div class="flex items-center justify-between bg-white/5 border border-white/10 rounded-2xl p-4 flex-wrap gap-4">
                <div class="flex items-center gap-2">
                    <i class="fas fa-server text-red-500 text-sm"></i>
                    <span class="text-sm font-bold text-gray-200">Streaming Server:</span>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="switchServer('vidsrc')" class="server-btn px-4 py-1.5 bg-red-600 text-white rounded-lg text-xs font-bold transition-all shadow-md">Server 1 (VidSrc)</button>
                    <button onclick="switchServer('vidlink')" class="server-btn px-4 py-1.5 bg-white/5 text-gray-300 hover:bg-white/10 rounded-lg text-xs font-bold transition-all border border-white/5">Server 2 (VidLink - Clean)</button>
                    <button onclick="switchServer('embedsu')" class="server-btn px-4 py-1.5 bg-white/5 text-gray-300 hover:bg-white/10 rounded-lg text-xs font-bold transition-all border border-white/5">Server 3 (Embed.su)</button>
                    <button onclick="switchServer('vidsrcxyz')" class="server-btn px-4 py-1.5 bg-white/5 text-gray-300 hover:bg-white/10 rounded-lg text-xs font-bold transition-all border border-white/5">Server 4 (VidSrc.xyz)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-black py-12 px-4 md:px-12 border-t border-white/10 mt-12 relative z-30">
        <div class="mx-auto max-w-[1440px] text-center text-xs text-gray-500">
            <p class="mb-4">sauce.watch is a free streaming catalog guide aggregator. This site does not store any files on our server, we only link to media hosted on 3rd party services.</p>
            <p class="mt-2">sauce.watch © 2026. All Rights Reserved</p>
        </div>
    </footer>

    <!-- JavaScript Player Engine -->
    <script>
        const TMDB_API_KEY = "607bf14c16a8ab16f9ed61e6ba5920a7";
        const TMDB_BASE = "https://api.themoviedb.org/3";
        const POSTER_BASE = "https://image.tmdb.org/t/p/w500";
        const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";
        
        let currentMovieId = '';
        let currentType = 'movie';
        let activeSeasonNum = 1;
        let activeEpisodeNum = 1;
        let currentServer = 'vidsrc';
        let isMuted = true;

        // YouTube IFrame Player API Integration
        let trailerPlayer;
        let ytApiReady = false;
        let pendingTrailerKey = '';

        // Load YouTube IFrame Player API script dynamically
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = () => {
            ytApiReady = true;
            if (pendingTrailerKey) {
                setupTrailerPlayer(pendingTrailerKey);
            }
        };

        function setupTrailerPlayer(videoKey) {
            trailerPlayer = new YT.Player('youtube-player', {
                width: '1920',
                height: '1080',
                videoId: videoKey,
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 0,
                    showinfo: 0,
                    rel: 0,
                    iv_load_policy: 3,
                    loop: 1,
                    playlist: videoKey,
                    playsinline: 1,
                    disablekb: 1,
                    fs: 0,
                    modestbranding: 1,
                    vq: 'hd1080'
                },
                events: {
                    onReady: (event) => {
                        event.target.setPlaybackQuality('hd1080');
                        event.target.mute();
                        event.target.playVideo();
                    },
                    onStateChange: (event) => {
                        const wrapper = document.getElementById('trailer-wrapper');
                        const staticImg = document.getElementById('backdropStatic');
                        
                        if (event.data === YT.PlayerState.PLAYING) {
                            event.target.setPlaybackQuality('hd1080'); // Force high quality
                            
                            if (!wrapper.dataset.hasPlayed) {
                                wrapper.dataset.hasPlayed = "true";
                                // THE MAGIC TRICK: Wait 4.0s for YouTube overlays to auto-hide before revealing
                                setTimeout(() => {
                                    if (wrapper) {
                                        wrapper.style.transition = 'opacity 1s ease';
                                        wrapper.style.opacity = '1';
                                    }
                                    if (staticImg) staticImg.style.opacity = '0';
                                    document.getElementById('trailerVolumeBtn').classList.remove('hidden');
                                    
                                    // Activate idle-mode: mouse stops moving → UI collapses to show trailer
                                    if (!trailerIsPlaying) enableHeroFocusMode();
                                }, 4000);
                            } else {
                                // Resuming from background tab pause
                                // YouTube redraws the play icon on pause, so we must wait for it to fade out again
                                setTimeout(() => {
                                    if (wrapper) {
                                        wrapper.style.transition = 'opacity 1s ease';
                                        wrapper.style.opacity = '1';
                                    }
                                }, 2000);
                            }
                        }
                        if (event.data === YT.PlayerState.PAUSED) {
                            // Immediately hide wrapper to prevent showing the big center pause icon when tab loses focus
                            if (wrapper) {
                                wrapper.style.transition = 'none';
                                wrapper.style.opacity = '0.01';
                            }
                            event.target.playVideo();
                        }
                    }
                }
            });
        }

        // Switch stream server inside the modal player
        function switchServer(serverKey) {
            const playerIframe = document.getElementById('videoPlayer');
            let src = '';
            
            const epPath = currentType === 'tv' ? `/${activeSeasonNum}/${activeEpisodeNum}` : '';

            if (serverKey === 'vidsrc') {
                src = currentType === 'tv' 
                    ? `https://vidsrc.to/embed/tv/${currentMovieId}${epPath}` 
                    : `https://vidsrc.to/embed/movie/${currentMovieId}`;
            } else if (serverKey === 'vidlink') {
                src = `https://vidlink.pro/embed/${currentType}/${currentMovieId}${currentType === 'tv' ? `/season/${activeSeasonNum}/episode/${activeEpisodeNum}` : ''}`;
            } else if (serverKey === 'embedsu') {
                src = `https://embed.su/embed/${currentType}/${currentMovieId}${currentType === 'tv' ? `/${activeSeasonNum}/${activeEpisodeNum}` : ''}`;
            } else if (serverKey === 'vidsrcxyz') {
                src = `https://vidsrc.xyz/embed/${currentType}/${currentMovieId}${currentType === 'tv' ? `/${activeSeasonNum}/${activeEpisodeNum}` : ''}`;
            }
            
            playerIframe.src = src;
            currentServer = serverKey;

            // Highlight buttons
            const buttons = document.querySelectorAll('.server-btn');
            buttons.forEach(btn => {
                if (btn.innerText.toLowerCase().includes(serverKey) || 
                    (serverKey === 'vidsrc' && btn.innerText.includes('VidSrc') && !btn.innerText.includes('.xyz'))) {
                    btn.className = "server-btn px-4 py-1.5 bg-red-600 text-white rounded-lg text-xs font-bold transition-all shadow-md";
                } else {
                    btn.className = "server-btn px-4 py-1.5 bg-white/5 text-gray-300 hover:bg-white/10 rounded-lg text-xs font-bold transition-all border border-white/5";
                }
            });
        }

        // Fetch trailers/videos from TMDB API
        async function fetchAndSetupTrailerBackground() {
            try {
                const res = await fetch(`${TMDB_BASE}/${currentType}/${currentMovieId}/videos?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                const videos = data.results || [];
                const trailer = videos.find(v => v.site === 'YouTube' && v.type === 'Trailer') ||
                                videos.find(v => v.site === 'YouTube' && v.type === 'Teaser') ||
                                videos.find(v => v.site === 'YouTube');
                if (!trailer) return;

                function doInjectPlayer() {
                    const playerContainer = document.getElementById('trailer-wrapper');
                    if (!playerContainer || document.getElementById('youtube-player').tagName === 'IFRAME') return;
                    // The #youtube-player div is already in the HTML from the wrapper
                    if (ytApiReady) {
                        setupTrailerPlayer(trailer.key);
                    } else {
                        pendingTrailerKey = trailer.key;
                    }
                }

                // Unconditionally inject player. Modern mobile browsers allow muted autoplay.
                doInjectPlayer();
            } catch (err) {
                console.error('Failed to load background trailer video:', err);
            }
        }

        // Toggle volume for YouTube trailer background using official Player API
        document.getElementById('trailerVolumeBtn').addEventListener('click', () => {
            if (!trailerPlayer || typeof trailerPlayer.mute !== 'function') return;
            
            isMuted = !isMuted;
            const volumeIcon = document.getElementById('volumeIcon');
            
            if (isMuted) {
                trailerPlayer.mute();
                volumeIcon.className = "fas fa-volume-mute";
            } else {
                trailerPlayer.unMute();
                volumeIcon.className = "fas fa-volume-up text-red-500";
            }
        });

        // Open Cinema modal player
        function openPlayerModal() {
            // If background trailer trailer is active and unmuted, mute it first
            if (trailerPlayer && typeof trailerPlayer.mute === 'function' && !isMuted) {
                isMuted = true;
                trailerPlayer.mute();
                document.getElementById('volumeIcon').className = "fas fa-volume-mute";
            }
            
            switchServer(currentServer);
            document.getElementById('playerModal').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        // Close Cinema modal player
        document.getElementById('closePlayerBtn').addEventListener('click', () => {
            document.getElementById('videoPlayer').src = '';
            document.getElementById('playerModal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });

        // Populate TV Seasons and Episodes Lists
        async function fetchEpisodes(seasonNum) {
            const grid = document.getElementById('episodeGrid');
            grid.innerHTML = '<p class="text-zinc-500 text-xs">Loading episodes...</p>';
            try {
                const res = await fetch(`${TMDB_BASE}/tv/${currentMovieId}/season/${seasonNum}?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                grid.innerHTML = '';
                
                (data.episodes || []).forEach(ep => {
                    const btn = document.createElement('button');
                    btn.className = `episode-btn p-3 rounded-xl border text-sm font-bold text-left transition-all bg-white/5 border-white/5 text-gray-300 hover:border-white/10 hover:bg-white/10`;
                    btn.innerHTML = `
                        <div class="text-[9px] opacity-60">EPISODE ${ep.episode_number}</div>
                        <div class="truncate text-xs mt-0.5">${ep.name}</div>
                    `;
                    btn.addEventListener('click', () => {
                        activeSeasonNum = parseInt(seasonNum);
                        activeEpisodeNum = ep.episode_number;

                        // Highlight selected episode button
                        document.querySelectorAll('.episode-btn').forEach(b => {
                            b.className = "episode-btn p-3 rounded-xl border border-white/5 text-sm font-bold text-left transition-all bg-white/5 text-gray-300 hover:border-white/10 hover:bg-white/10";
                        });
                        btn.className = "episode-btn p-3 rounded-xl border border-red-500 text-sm font-bold text-left transition-all bg-red-600 text-white shadow-md";

                        openPlayerModal();
                    });
                    grid.appendChild(btn);
                });
            } catch (err) {
                console.error("Episodes load broken:", err);
                grid.innerHTML = '<p class="text-red-500 text-xs">Failed to load episodes.</p>';
            }
        }

        // Initialize and Setup Page Layout
        async function loadPlayerEngine() {
            const urlParams = new URLSearchParams(window.location.search);
            currentMovieId = urlParams.get('id');
            currentType = urlParams.get('type') || 'movie';

            if (!currentMovieId) {
                alert("No Movie/Show ID specified. Returning to catalog.");
                window.location.href = "index.html";
                return;
            }

            // TV Specific layout setups
            if (currentType === 'tv') {
                document.getElementById('tvSelectorContainer').classList.remove('hidden');
                document.getElementById('jumpToEpisodesBtn').classList.remove('hidden');
                
                // Link "Episodes" jump button
                document.getElementById('jumpToEpisodesBtn').addEventListener('click', () => {
                    document.getElementById('tvSelectorContainer').scrollIntoView({ behavior: 'smooth' });
                });
            }

            // Link "Similars" jump button
            document.getElementById('jumpToSimilarBtn').addEventListener('click', () => {
                document.getElementById('recommendationsSection').scrollIntoView({ behavior: 'smooth' });
            });

            // Set main Play button listener
            document.getElementById('mainPlayBtn').addEventListener('click', () => {
                if (currentType === 'tv') {
                    // TV shows: scroll to episode list or play first episode
                    document.getElementById('tvSelectorContainer').scrollIntoView({ behavior: 'smooth' });
                } else {
                    openPlayerModal();
                }
            });

            // Set background trailer
            fetchAndSetupTrailerBackground();

            try {
                // Fetch Main metadata details
                const res = await fetch(`${TMDB_BASE}/${currentType}/${currentMovieId}?api_key=${TMDB_API_KEY}`);
                const data = await res.json();

                if (data) {
                    const title = data.title || data.name;
                    const releaseDate = data.release_date || data.first_air_date || "";
                    const year = releaseDate ? releaseDate.split('-')[0] : "N/A";
                    const runtime = data.runtime ? `${data.runtime}m` : (data.episode_run_time ? `${data.episode_run_time[0]}m` : "N/A");
                    const genresList = (data.genres || []).map(g => g.name).join(", ");
                    
                    document.title = `Watching ${title} - sauce.watch`;
                    
                    // Fetch logo images
                    let logoUrl = null;
                    try {
                        const imagesRes = await fetch(`${TMDB_BASE}/${currentType}/${currentMovieId}/images?api_key=${TMDB_API_KEY}`);
                        const imagesData = await imagesRes.json();
                        const logos = imagesData.logos || [];
                        const englishLogo = logos.find(l => l.iso_639_1 === 'en');
                        const logoToUse = englishLogo || logos[0];
                        if (logoToUse && logoToUse.file_path) {
                            logoUrl = `https://image.tmdb.org/t/p/w500${logoToUse.file_path}`;
                        }
                    } catch (err) {
                        console.error("Failed to fetch logo:", err);
                    }

                    const titleTextEl = document.getElementById('heroTitleText');
                    const titleLogoEl = document.getElementById('heroTitleLogo');

                    if (logoUrl) {
                        titleLogoEl.src = logoUrl;
                        titleLogoEl.alt = title;
                        titleLogoEl.classList.remove('hidden');
                        titleTextEl.classList.add('hidden');
                    } else {
                        titleTextEl.innerText = title;
                        titleTextEl.classList.remove('hidden');
                        titleLogoEl.classList.add('hidden');
                    }
                    
                    document.getElementById('heroOverview').innerText = data.overview || "No description found.";
                    document.getElementById('movieYear').innerText = year;
                    document.getElementById('movieRuntime').innerText = runtime;
                    document.getElementById('movieGenres').innerText = genresList || "N/A";
                    
                    if (data.backdrop_path) {
                        // Set the static image that shows while video loads
                        const staticImg = document.getElementById('backdropStatic');
                        if (staticImg) staticImg.src = `${BACKDROP_BASE}${data.backdrop_path}`;
                    }

                    // TV Specific: Populate seasons options
                    if (currentType === 'tv' && data.seasons) {
                        const select = document.getElementById('seasonSelect');
                        select.innerHTML = '';
                        const validSeasons = data.seasons.filter(s => s.season_number > 0);
                        validSeasons.forEach(s => {
                            const opt = document.createElement('option');
                            opt.value = s.season_number;
                            opt.textContent = `Season ${s.season_number}`;
                            select.appendChild(opt);
                        });

                        select.addEventListener('change', (e) => {
                            fetchEpisodes(e.target.value);
                        });

                        if (validSeasons.length > 0) {
                            fetchEpisodes(validSeasons[0].season_number);
                        }
                    }
                    
                    document.getElementById('movieRating').innerText = data.vote_average ? data.vote_average.toFixed(1) : "0.0";
                    
                    // Fade in the hero content block now that everything is populated
                    const heroContent = document.getElementById('heroContent');
                    if (heroContent) heroContent.classList.remove('opacity-0');
                }

                // Fetch Cast credits
                fetchCredits();

                // Initialize recommendations (infinite scroll)
                initRecommendations();

            } catch (err) {
                console.error("Details API pipeline failed:", err);
            }
        }

        // Fetch Actors and Profiles
        async function fetchCredits() {
            try {
                const res = await fetch(`${TMDB_BASE}/${currentType}/${currentMovieId}/credits?api_key=${TMDB_API_KEY}`);
                const data = await res.json();
                const carousel = document.getElementById('castCarousel');
                carousel.innerHTML = '';
                
                const cast = (data.cast || []).slice(0, 15);
                if (cast.length > 0) {
                    document.getElementById('castSection').classList.remove('hidden');
                    cast.forEach(actor => {
                        const card = document.createElement('a');
                        card.href = `actor.html?id=${actor.id}`;
                        card.className = "min-w-[120px] max-w-[120px] bg-white/5 border border-white/5 rounded-2xl overflow-hidden text-center p-3 hover:border-white/30 hover:bg-white/10 transition-all flex flex-col items-center shadow-lg cursor-pointer";
                        
                        const profileUrl = actor.profile_path 
                            ? `https://image.tmdb.org/t/p/w185${actor.profile_path}` 
                            : `https://ui-avatars.com/api/?name=${encodeURIComponent(actor.name)}&background=27272a&color=fff&size=128`;

                        card.innerHTML = `
                            <img src="${profileUrl}" class="w-16 h-16 object-cover rounded-full border border-white/10 mb-2 shadow" alt="${actor.name}" />
                            <h4 class="text-xs font-bold text-white truncate w-full">${actor.name}</h4>
                            <p class="text-[10px] text-gray-400 truncate w-full mt-0.5">${actor.character || "Actor"}</p>
                        `;
                        carousel.appendChild(card);
                    });
                }
            } catch (err) {
                console.error("Cast fetch failed:", err);
            }
        }

        // Recommendations Pagination State
        let currentRecPage = 1;
        let isFetchingRecs = false;
        let hasMoreRecs = true;

        async function initRecommendations() {
            // Setup Intersection Observer for Infinite Scroll
            const trigger = document.getElementById('loadMoreTrigger');
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && hasMoreRecs && !isFetchingRecs) {
                    loadNextRecommendationsPage();
                }
            }, { rootMargin: '200px' });
            observer.observe(trigger);

            // Load first page immediately
            await loadNextRecommendationsPage();
        }

        async function loadNextRecommendationsPage() {
            if (isFetchingRecs || !hasMoreRecs) return;
            isFetchingRecs = true;
            document.getElementById('loadingSpinner').classList.remove('hidden');

            try {
                let res = await fetch(`${TMDB_BASE}/${currentType}/${currentMovieId}/recommendations?api_key=${TMDB_API_KEY}&page=${currentRecPage}`);
                let data = await res.json();
                
                // If recommendations are empty, fallback to 'similar' endpoint to keep infinite scroll going
                if (!data.results || data.results.length === 0) {
                    res = await fetch(`${TMDB_BASE}/${currentType}/${currentMovieId}/similar?api_key=${TMDB_API_KEY}&page=${currentRecPage}`);
                    data = await res.json();
                }

                const grid = document.getElementById('recommendationsGrid');
                const items = data.results || [];
                
                if (items.length === 0 || currentRecPage >= data.total_pages) {
                    hasMoreRecs = false;
                }

                if (items.length > 0) {
                    document.getElementById('recommendationsSection').classList.remove('hidden');
                    
                    items.forEach(item => {
                        // Use backdrop_path for landscape layout
                        if (!item.backdrop_path) return;
                        
                        const type = item.media_type || currentType;
                        const card = document.createElement('a');
                        card.href = `watch.html?id=${item.id}&type=${type}`;
                        // Changed to landscape wrapper (aspect-video is 16:9)
                        card.className = "flex flex-col gap-2 group cursor-pointer w-full";
                        
                        const rating = item.vote_average ? item.vote_average.toFixed(1) : "0.0";
                        const title = item.title || item.name;
                        const dateText = item.release_date || item.first_air_date || "";
                        const year = dateText ? dateText.split('-')[0] : "";
                        const typeLabel = type === 'tv' ? 'TV Show' : 'Movie';

                        const rtScore = Math.round(item.vote_average * 10);

                        card.innerHTML = `
                            <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-zinc-800 border border-white/5 group-hover:border-white/20 transition-all shadow-lg">
                                <img src="${POSTER_BASE}${item.backdrop_path}" alt="${title}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                <img id="logo-${item.id}" src="" class="absolute bottom-2 left-2 w-1/3 object-contain drop-shadow-md hidden z-10 pointer-events-none transition-opacity duration-500">
                                <div class="absolute inset-0 flex justify-center items-center opacity-0 transition-opacity z-20 pointer-events-none" id="hover-spinner-${item.id}">
                                    <div class="w-8 h-8 border-2 border-white/20 border-t-red-600 rounded-full animate-spin"></div>
                                </div>
                                <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md rounded px-1.5 py-0.5 text-[10px] font-bold text-white flex items-center gap-1 opacity-0 transition-opacity z-10" id="volIcon-${item.id}">
                                    <i class="fas fa-volume-mute text-xs"></i>
                                </div>
                                <!-- Normal wrapper, relying on 4.0s timeout to hide YouTube UI -->
                                <div id="trailer-wrapper-${item.id}" class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-0 transition-opacity duration-700" style="opacity: 0.01;">
                                    <div id="trailer-player-${item.id}" class="w-full h-full pointer-events-none"></div>
                                </div>
                            </div>
                            <div class="px-1 mt-2">
                                <h5 class="font-bold text-sm text-white truncate w-full group-hover:text-red-400 transition-colors">${title}</h5>
                                <div class="flex items-center gap-2 text-[11px] text-zinc-400 font-medium mt-0.5">
                                    <span class="text-yellow-500 flex items-center"><i class="fas fa-star text-[9px] mr-0.5"></i> ${rating}</span>
                                    <span class="text-white flex items-center gap-1"><img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f345.svg" class="w-3 h-3 drop-shadow-sm" alt="RT"> ${rtScore}%</span>
                                    ${year ? `<span class="opacity-40">•</span><span>${year}</span>` : ''}
                                    <span class="opacity-40">•</span><span>${typeLabel}</span>
                                </div>
                            </div>
                        `;

                        // Fetch Logo dynamically
                        fetch(`${TMDB_BASE}/${type}/${item.id}/images?api_key=${TMDB_API_KEY}`)
                            .then(res => res.json())
                            .then(imagesData => {
                                const logos = imagesData.logos || [];
                                const englishLogo = logos.find(l => l.iso_639_1 === 'en');
                                const logoToUse = englishLogo || logos[0];
                                if (logoToUse && logoToUse.file_path) {
                                    const logoImg = card.querySelector(`#logo-${item.id}`);
                                    logoImg.src = `https://image.tmdb.org/t/p/w500${logoToUse.file_path}`;
                                    logoImg.classList.remove('hidden');
                                }
                            }).catch(console.error);

                        // Add Hover Trailer Logic (only on desktop/non-touch)
                        if (!('ontouchstart' in window)) {
                            let hoverTimer = null;
                            let cardYtPlayer = null;
                            const trailerWrapper = card.querySelector(`#trailer-wrapper-${item.id}`);
                            const trailerPlayerDiv = card.querySelector(`#trailer-player-${item.id}`);
                            const volIcon = card.querySelector(`#volIcon-${item.id}`);
                            const spinner = card.querySelector(`#hover-spinner-${item.id}`);
                            const cardLogo = card.querySelector(`#logo-${item.id}`);

                            card.addEventListener('mouseenter', () => {
                                hoverTimer = setTimeout(async () => {
                                    if (cardYtPlayer) {
                                        trailerWrapper.style.opacity = '1';
                                        volIcon.classList.remove('opacity-0');
                                        if (cardLogo) cardLogo.classList.add('opacity-0');
                                        return;
                                    }
                                    
                                    spinner.classList.remove('opacity-0');
                                    
                                    try {
                                        const vidRes = await fetch(`${TMDB_BASE}/${type}/${item.id}/videos?api_key=${TMDB_API_KEY}`);
                                        const vidData = await vidRes.json();
                                        const vids = vidData.results || [];
                                        const trailer = vids.find(v => v.type === 'Trailer' && v.site === 'YouTube') || vids.find(v => v.site === 'YouTube');
                                        
                                        if (trailer && ytApiReady) {
                                            cardYtPlayer = new YT.Player(`trailer-player-${item.id}`, {
                                                videoId: trailer.key,
                                                width: '100%',
                                                height: '100%',
                                                playerVars: {
                                                    autoplay: 1,
                                                    mute: 1,
                                                    controls: 0,
                                                    showinfo: 0,
                                                    rel: 0,
                                                    iv_load_policy: 3,
                                                    loop: 1,
                                                    playlist: trailer.key,
                                                    playsinline: 1,
                                                    disablekb: 1,
                                                    fs: 0,
                                                    modestbranding: 1,
                                                    vq: 'small' // 360p
                                                },
                                                events: {
                                                    onReady: (event) => {
                                                        event.target.setPlaybackQuality('small');
                                                        event.target.mute();
                                                        event.target.playVideo();
                                                    },
                                                    onStateChange: (event) => {
                                                        if (event.data === YT.PlayerState.PLAYING) {
                                                            event.target.setPlaybackQuality('small');
                                                            // Hide UI by waiting a moment after it starts playing
                                                            // We wait 4.0s to ensure the YouTube play button and title completely fade out
                                                            setTimeout(() => {
                                                                if (card.matches(':hover') && trailerWrapper) {
                                                                    trailerWrapper.style.transition = 'opacity 0.8s ease';
                                                                    trailerWrapper.style.opacity = '1';
                                                                    volIcon.classList.remove('opacity-0');
                                                                    spinner.classList.add('opacity-0');
                                                                    if (cardLogo) cardLogo.classList.add('opacity-0');
                                                                }
                                                            }, 4000);
                                                        }
                                                        if (event.data === YT.PlayerState.PAUSED) {
                                                            // Force play if it randomly pauses
                                                            event.target.playVideo();
                                                        }
                                                    }
                                                }
                                            });
                                        } else {
                                            spinner.classList.add('opacity-0');
                                        }
                                    } catch (e) { 
                                        console.error(e); 
                                        spinner.classList.add('opacity-0');
                                    }
                                }, 500); // 500ms hover intent delay
                            });

                            card.addEventListener('mouseleave', () => {
                                clearTimeout(hoverTimer);
                                spinner.classList.add('opacity-0');
                                if (cardLogo) cardLogo.classList.remove('opacity-0');
                                trailerWrapper.style.transition = 'none';
                                trailerWrapper.style.opacity = '0.01';
                                volIcon.classList.add('opacity-0');
                                // Destroy iframe after fade out to save resources
                                if (cardYtPlayer && typeof cardYtPlayer.destroy === 'function') {
                                    cardYtPlayer.destroy();
                                    cardYtPlayer = null;
                                    // re-create the div for next time since destroy() removes the iframe
                                    trailerWrapper.innerHTML = `<div id="trailer-player-${item.id}" class="w-full h-full pointer-events-none"></div>`;
                                }
                            });
                        }

                        grid.appendChild(card);
                    });
                }
                currentRecPage++;
            } catch (err) {
                console.error("Recommendations pagination failed:", err);
            } finally {
                isFetchingRecs = false;
                document.getElementById('loadingSpinner').classList.add('hidden');
            }
        }

        // ── Hero idle/focus mode ──
        // Once trailer is playing, if mouse is idle for 3s → collapse UI to show trailer cleanly
        // Any mouse movement instantly restores the full UI
        let heroIdleTimer = null;
        let trailerIsPlaying = false;

        function enableHeroFocusMode() {
            trailerIsPlaying = true;
            const hero = document.getElementById('heroSection');
            hero.addEventListener('mousemove', onHeroMouseMove);
            hero.addEventListener('mouseleave', onHeroMouseLeave);
        }

        function onHeroMouseMove() {
            const hero = document.getElementById('heroSection');
            // Mouse is moving — show full UI immediately
            hero.classList.remove('trailer-focused');
            clearTimeout(heroIdleTimer);
            // After 3s of no movement, collapse to focused mode
            heroIdleTimer = setTimeout(() => {
                if (trailerIsPlaying) hero.classList.add('trailer-focused');
            }, 3000);
        }

        function onHeroMouseLeave() {
            const hero = document.getElementById('heroSection');
            clearTimeout(heroIdleTimer);
            hero.classList.remove('trailer-focused');
        }

        window.addEventListener('DOMContentLoaded', loadPlayerEngine);
    </script>
</body>
</html>
